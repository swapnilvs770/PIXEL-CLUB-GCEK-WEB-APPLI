[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build -w @pcmp/api"

[deploy]
startCommand = "npm run start -w @pcmp/api"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[env]
NODE_ENV = "production"
PORT = { generator = "PORT" }
